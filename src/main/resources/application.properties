spring.application.name=tracking
# Koneksi ke database MySQL XAMPP
spring.datasource.url=jdbc:mysql://localhost:3307/db_magang?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Pengaturan JPA / Hibernate untuk membuat tabel otomatis
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
